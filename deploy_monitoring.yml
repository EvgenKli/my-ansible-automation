---
- name: Deploy SRE Monitoring Stack (Prometheus + Grafana)
  hosts: database # Разворачиваес на сервере 111.88.218.19
  become: true
  tasks:

    - name: Step 1 - Install Docker and tools if not present
      apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present
        update_cache: yes
        cache_valid_time: 3600

    - name: Step 2 - Create monitoring directory structure
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /opt/monitoring
        - /etc/prometheus

    - name: Step 3 - Create Prometheus Configuration File
      copy:
        dest: /etc/prometheus/prometheus.yml
        content: |
          global:
            scrape_interval: 5s # Каждые 5 секунд опрашиваем наши серверы

          scrape_configs:
            - job_name: 'kubernetes-nodes'
              static_configs:
                # Указываем внутренние IP-адреса нод Мастера и Воркера
                - targets: ['192.168.10.172:9100', '192.168.10.198:9100']
        mode: '0644'

    - name: Step 4 - Deploy Prometheus & Grafana via Docker Compose
      copy:
        dest: /opt/monitoring/docker-compose.yml
        content: |
          services:
            prometheus:
              image: prom/prometheus:latest
              container_name: prometheus
              volumes:
                - /etc/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
              ports:
                - "9090:9090"
              restart: always

            grafana:
              image: grafana/grafana:latest
              container_name: grafana
              ports:
                - "3000:3000"
              restart: always
        mode: '0644'

    - name: Step 5 - Start Monitoring Stack
      shell: docker compose -f /opt/monitoring/docker-compose.yml up -d
      changed_when: false        